name: Update site
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6,16 * * *" # Every day at 6am. Modify this as you see fit

permissions:
  contents: write

concurrency:
  group: update-site-main
  cancel-in-progress: false

jobs:
  DeploySite:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy site
        uses: lwojcik/github-action-deploy-static-site@v1
        with:
          platform: netlify
          netlify_deploy_hook_url: ${{ secrets.NETLIFY_DEPLOY_HOOK_URL }}
          always_deploy: true
          # Using Netlify? Configure this action as follows:
          # platform: netlify
          # netlify_deploy_hook_url: ${{ secrets.NETLIFY_DEPLOY_HOOK_URL }}
          # always_deploy: true

      - name: Checkout repository
        if: success()
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log successful update in README
        if: success()
        run: |
          stamp="$(date -u +'%Y-%m-%d-%H-%M-%S')"
          echo "- update completed ${stamp}" >> README.md

      - name: Commit and push README update
        if: success()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No README changes to commit."
            exit 0
          fi
          git commit -m "chore: log successful workflow run ${GITHUB_RUN_ID}"
          branch="${GITHUB_REF_NAME:-main}"
          for attempt in 1 2 3; do
            git pull --rebase origin "${branch}"
            if git push origin "HEAD:${branch}"; then
              exit 0
            fi
            echo "Push rejected on attempt ${attempt}. Retrying..."
            sleep $((attempt * 2))
          done
          echo "Failed to push README update after 3 attempts."
          exit 1
