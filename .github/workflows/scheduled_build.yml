name: Update site
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6,16 * * *" # Daily at 06:00 and 16:00 UTC

permissions:
  contents: read

concurrency:
  group: update-site-main
  cancel-in-progress: false

jobs:
  DeploySite:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify deploy
        env:
          NETLIFY_DEPLOY_HOOK_URL: ${{ secrets.NETLIFY_DEPLOY_HOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${NETLIFY_DEPLOY_HOOK_URL:-}" ]; then
            echo "::error::Missing NETLIFY_DEPLOY_HOOK_URL secret."
            exit 1
          fi

          echo "Triggering Netlify deploy for input.relcfp.com..."
          http_code="$(curl --silent --show-error --location \
            --output /tmp/netlify-deploy-response.txt \
            --write-out "%{http_code}" \
            --request POST \
            --header "Content-Type: application/json" \
            --data '{}' \
            "${NETLIFY_DEPLOY_HOOK_URL}")"

          echo "Netlify deploy hook responded with HTTP ${http_code}."
          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "::error::Netlify deploy hook failed with HTTP ${http_code}."
            if [ -s /tmp/netlify-deploy-response.txt ]; then
              echo "Response body:"
              cat /tmp/netlify-deploy-response.txt
            fi
            exit 1
          fi

          echo "::notice::Netlify deploy hook accepted the deployment request."
          if [ -s /tmp/netlify-deploy-response.txt ]; then
            echo "Response body:"
            cat /tmp/netlify-deploy-response.txt
          fi

      - name: Write deploy summary
        if: success()
        run: |
          {
            echo "### Deploy queued"
            echo ""
            echo "- Repository: \`adamdjbrett/input.relcfp.com\`"
            echo "- Triggered: \`$(date -u +'%Y-%m-%dT%H:%M:%SZ')\`"
            echo "- Result: Netlify deploy hook accepted the request."
          } >> "$GITHUB_STEP_SUMMARY"
